<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="goldText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8B44A"/>
      <stop offset="1" stop-color="#C8901E"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.78" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#C8901E" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#C8901E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.18" cy="0.85" r="0.5">
      <stop offset="0" stop-color="#7858C8" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#7858C8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#060610"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- corner mark -->
  <g transform="translate(80,72)">
    <rect width="56" height="56" rx="11" fill="none" stroke="#C8901E" stroke-opacity="0.45"/>
    <text x="28" y="40" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="32" font-weight="600" font-style="italic"
          fill="url(#goldText)">SC</text>
  </g>

  <!-- eyebrow -->
  <g transform="translate(80,200)">
    <line x1="0" y1="11" x2="34" y2="11" stroke="#C8901E" stroke-width="1"/>
    <text x="48" y="16"
          font-family="'DM Sans', system-ui, sans-serif"
          font-size="16" letter-spacing="3.5" fill="#C8901E">SCENECRAFT STUDIO</text>
  </g>

  <!-- headline -->
  <text x="80" y="312"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="92" font-weight="600" fill="#EDE9DD">AI-powered</text>
  <text x="80" y="412"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="92" font-weight="300" font-style="italic"
        fill="url(#goldText)">screenwriting.</text>

  <!-- subhead -->
  <text x="80" y="478"
        font-family="'DM Sans', system-ui, sans-serif"
        font-size="24" fill="#A8A295">Feature films, TV, documentaries, and 9 more formats —</text>
  <text x="80" y="510"
        font-family="'DM Sans', system-ui, sans-serif"
        font-size="24" fill="#A8A295">tailored tools, structure, and AI assistance for every script.</text>

  <!-- footer rule + tag -->
  <line x1="80" y1="558" x2="1120" y2="558" stroke="#C8901E" stroke-opacity="0.25"/>
  <text x="80" y="588"
        font-family="'Courier New', monospace"
        font-size="14" letter-spacing="2" fill="#6E6888">FADE IN:</text>
  <text x="1120" y="588" text-anchor="end"
        font-family="'DM Sans', system-ui, sans-serif"
        font-size="14" letter-spacing="2" fill="#6E6888">scenecraft.studio</text>
</svg>
